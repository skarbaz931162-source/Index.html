<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .box { background: #1e293b; padding: 30px; border-radius: 20px; width: 85%; text-align: center; }
        input { padding: 15px; margin: 10px 0; width: 100%; border-radius: 10px; border: none; box-sizing: border-box; }
        button { padding: 15px; margin: 10px 0; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        #login { background: gold; color: black; }
        #register { background: white; color: black; }
    </style>
</head>
<body>
    <div class="box">
        <h2>CN LUDO LOGIN</h2>
        <input type="text" id="u" placeholder="Username">
        <input type="password" id="p" placeholder="Password">
        <button id="login">LOGIN</button>
        <button id="register">REGISTER</button>
    </div>
    <script>
        const sb = supabase.createClient('https://pubntihxkdwrgxaqumtj.supabase.co', 'sb_publishable_TzLg10jeLU6J8-wYsJ4oYg_UZL6iWgs');
        document.getElementById('register').onclick = async () => {
            const { error } = await sb.from('users').insert([{ username: document.getElementById('u').value, password: document.getElementById('p').value }]);
            error ? alert("Error: " + error.message) : alert("Account Created!");
        };
        document.getElementById('login').onclick = async () => {
            const { data, error } = await sb.from('users').select('*').eq('username', document.getElementById('u').value).eq('password', document.getElementById('p').value);
            if (data && data.length > 0) {
                alert("Login Success!");
                window.location.href = "dashboard.html";
            } else alert("Invalid Login!");
        };
    </script>
</body>
</html>
