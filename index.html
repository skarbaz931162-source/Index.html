<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CN LUDO HUB - Dashboard</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .card { background: #1e293b; padding: 25px; border-radius: 20px; margin: 20px auto; border: 1px solid #334155; max-width: 400px; }
        .btn { width: 100%; padding: 18px; margin: 10px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 16px; transition: 0.3s; }
        .btn-join { background: #22c55e; }
        .btn-deposit { background: #3b82f6; }
        .btn-refresh { background: #64748b; }
        .status { margin-top: 10px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>
    <h1>CN LUDO HUB</h1>
    <div class="card">
        <p>Wallet Balance</p>
        <h1 id="bal" style="color: gold; margin: 0;">₹ 200</h1>
    </div>
    
    <button class="btn btn-join" onclick="joinLobby()">JOIN LOBBY</button>
    <button class="btn btn-deposit" onclick="alert('Deposit section coming soon!')">DEPOSIT</button>
    <button class="btn btn-refresh" onclick="window.location.reload()">REFRESH PAGE</button>
    
    <div class="status" id="connStatus">Connecting to server...</div>

    <script>
        const socket = io("https://ludo-game-sag8.onrender.com", {
            transports: ['websocket'],
            reconnection: true
        });

        const statusText = document.getElementById('connStatus');

        socket.on('connect', () => {
            statusText.innerText = "Connected to Server ✅";
            statusText.style.color = "#22c55e";
        });

        socket.on('connect_error', () => {
            statusText.innerText = "Server Sleeping... Please Refresh ⚠️";
            statusText.style.color = "#ef4444";
        });

        function joinLobby() {
            if (socket.connected) {
                socket.emit('join_lobby', "Player_" + Math.floor(Math.random()*1000));
                alert("Request sent to Lobby!");
            } else {
                alert("Cannot connect to server. Check if Render service is active.");
            }
        }
    </script>
</body>
</html>
