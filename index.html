<head>

    <title>CN Ludo - Test</title>

<body>
    <div id="test-div">
        <input type="text" id="username" placeholder="Username" style="color:black">

        <button id="login-btn" style="background: yellow; color: black; padding: 10px;">Click Me to Test</button>

    <script>
        console.log("Script load ho gaya hai!");
        
        document.getElementById('login-btn').addEventListener('click', () => {
            alert("Button kaam kar raha hai! Button dab gaya.");
            console.log("Button clicked!");
        });
    </script>
