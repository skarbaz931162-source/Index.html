<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { background: #0f172a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 15px; margin: 15px 0; border: 1px solid #334155; }
        .btn { width: 100%; padding: 15px; margin: 8px 0; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>
    <h1>CN LUDO HUB</h1>
    <div class="card">
        <h3>Wallet Balance</h3>
        <h1 id="bal" style="color: gold;">₹ 200</h1>
    </div>
    
    <button class="btn" style="background:#22c55e;" onclick="joinLobby()">JOIN LOBBY</button>
    <button class="btn" style="background:#3b82f6;" onclick="depositPage()">DEPOSIT</button>
    <button class="btn" style="background:#ef4444;" onclick="logout()">LOGOUT</button>

    <script>
        const socket = io("https://ludo-game-sag8.onrender.com", {
            transports: ['websocket'],
            reconnection: true
        });

        socket.on('connect', () => {
            console.log("Connected!");
        });

        function joinLobby() {
            alert("Lobby connect ho rahi hai...");
            socket.emit('join_lobby', "Player_" + Math.floor(Math.random()*1000));
        }

        function depositPage() {
            alert("Deposit section par ja rahe hain...");
        }

        function logout() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
