<!DOCTYPE html>
<html>
<head>
    <title>CN LUDO Admin Panel</title>
    <style>
        body { background: #0f172a; color: white; padding: 20px; font-family: sans-serif; }
        .req-card { background: #1e293b; padding: 15px; margin: 10px 0; border-radius: 10px; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Admin Panel - Deposit Requests</h1>
    <div id="requests"></div>

    <script>
        // अपना API URL (जो Render से मिला है)
        const API_URL = "https://your-render-url.onrender.com";

        async function fetchRequests() {
            // यहाँ से आप पेंडिंग डिपॉजिट रिक्वेस्ट फेच करेंगे
            const res = await fetch(`${API_URL}/api/admin/pending-deposits`);
            const data = await res.json();
            const div = document.getElementById('requests');
            data.forEach(req => {
                div.innerHTML += `
                    <div class="req-card">
                        <p>User: ${req.username} | Amount: ₹${req.amount}</p>
                        <a href="${req.screenshotUrl}" target="_blank">View Screenshot</a>
                        <button onclick="approve('${req._id}')" style="background:green; color:white;">Approve</button>
                    </div>`;
            });
        }

        async function approve(id) {
            await fetch(`${API_URL}/api/admin/approve-deposit`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ requestId: id, status: 'Approved' })
            });
            alert("Done!");
            location.reload();
        }
        fetchRequests();
    </script>
</body>
</html>
