<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CN Ludo - Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .btn-fix { position: relative; z-index: 999; cursor: pointer; padding: 15px; margin: 10px; width: 200px; }
    </style>
</head>
<body>

    <div style="text-align: center; background: #1e293b; padding: 30px; border-radius: 20px;">
        <h1 style="color: gold;">CN LUDO TEST</h1>
        <input type="text" id="username" placeholder="Username" style="padding: 10px; display: block; margin: 10px auto;">
        <input type="password" id="password" placeholder="Password" style="padding: 10px; display: block; margin: 10px auto;">
        
        <button id="login-btn" class="btn-fix" style="background: gold;">LOGIN</button>
        <button id="register-btn" class="btn-fix" style="background: white;">REGISTER</button>
    </div>

    <script>
        const supabase = supabase.createClient('https://pubntihxkdwrgxaqumtj.supabase.co', 'sb_publishable_TzLg10jeLU6J8-wYsJ4oYg_UZL6iWgs');

        document.getElementById('login-btn').onclick = async () => {
            alert("Login daba diya!");
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const { data, error } = await supabase.from('users').select('*').eq('username', user).eq('password', pass);
            if (error) alert(error.message);
            else if (data.length > 0) alert("Login Successful!");
            else alert("Invalid User!");
        };

        document.getElementById('register-btn').onclick = async () => {
            alert("Register daba diya!");
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const { error } = await supabase.from('users').insert([{ username: user, password: pass }]);
            if (error) alert(error.message);
            else alert("Account Created!");
        };
    </script>
</body>
</html>
