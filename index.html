<script>
    // सर्वर से जुड़ें
    const socket = io("https://ludo-game-sag8.onrender.com", {
        transports: ['websocket'], // यह लाइन बहुत ज़रूरी है
        reconnection: true
    });
    
    socket.on('connect', () => {
        console.log("Connected!");
        alert("Server se connection ho gaya!");
    });

    socket.on('connect_error', (err) => {
        console.log("Error:", err);
        alert("Connection fail ho raha hai, check karo!");
    });

    function joinLobby() {
        alert("Lobby connect ho rahi hai...");
        socket.emit('join_lobby', "Player_" + Math.floor(Math.random()*1000));
    }
</script>
