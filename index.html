<script>
    // सर्वर से जुड़ने के लिए यह सेटिंग सबसे बेस्ट है
    const socket = io("https://ludo-game-sag8.onrender.com", {
        transports: ['websocket'],
        reconnection: true,
        reconnectionAttempts: 5
    });
    
    socket.on('connect', () => {
        console.log("Server se jud gaye!");
    });

    function joinLobby() {
        if(socket.connected) {
            socket.emit('join_lobby', "Player_" + Math.floor(Math.random()*1000));
            alert("Lobby me join ho gaye!");
        } else {
            alert("Server abhi busy hai, 5 second ruk kar try karo...");
        }
    }
</script>
