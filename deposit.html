<!DOCTYPE html>
<html>
<body>
    <h2>Deposit Funds</h2>
    <input type="number" id="amt" placeholder="Enter Amount">
    <button onclick="submitDeposit()">Submit Payment</button>

    <script>
        function submitDeposit() {
            let amount = document.getElementById('amt').value;
            // यहाँ हम सर्वर को डेटा भेजेंगे
            alert("Payment request of ₹" + amount + " sent to Admin!");
        }
    </script>
</body>
</html>
